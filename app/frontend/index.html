<!doctype html>
<html lang="ja" data-theme="niwaki">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Niwaki</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Single Host Compose Deploy UI</p>
          <h1 class="text-4xl font-semibold tracking-tight">Niwaki</h1>
          <p class="lede">Git 管理された Compose stack をブラウザから操作します。</p>
        </div>
        <div class="access-cards" id="access-cards"></div>
      </header>

      <main class="layout">
        <section class="panel panel-stacks">
          <div class="panel-header">
            <h2 class="text-lg font-semibold">Stacks</h2>
            <button class="btn btn-outline btn-sm" id="refresh-button" type="button">Refresh</button>
          </div>
          <div id="stack-list" class="stack-list"></div>
        </section>

        <section class="panel panel-detail">
          <div class="panel-header">
            <h2 class="text-lg font-semibold" id="detail-title">Stack Detail</h2>
            <span id="detail-status" class="badge badge-ghost">idle</span>
          </div>
          <div id="stack-detail" class="stack-detail"></div>
          <div class="actions" id="stack-actions"></div>
          <div class="split">
            <div>
              <h3 class="mb-2 text-sm font-semibold uppercase tracking-[0.14em] text-base-content/65">Containers</h3>
              <div id="container-list" class="list-block"></div>
            </div>
            <div>
              <h3 class="mb-2 text-sm font-semibold uppercase tracking-[0.14em] text-base-content/65">Logs</h3>
              <pre id="log-output" class="code-block">Stack を選択すると logs を表示します。</pre>
            </div>
          </div>
          <div>
            <h3 class="mb-2 text-sm font-semibold uppercase tracking-[0.14em] text-base-content/65">Last Command</h3>
            <pre id="action-output" class="code-block">まだ実行履歴はありません。</pre>
          </div>
        </section>
      </main>

      <section class="bottom-grid">
        <section class="panel">
          <div class="panel-header">
            <h2 class="text-lg font-semibold">Deploy History</h2>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="text-lg font-semibold">mDNS Aliases</h2>
          </div>
          <form id="alias-form" class="alias-form">
            <label>
              Alias
              <input class="input input-bordered w-full" id="alias-input" name="alias" placeholder="deploy.local" required />
            </label>
            <label>
              Target IP
              <input class="input input-bordered w-full" id="target-ip-input" name="target_ip" placeholder="192.168.1.10" />
            </label>
            <button class="btn btn-primary self-end" type="submit">Create Alias</button>
          </form>
          <div id="alias-list" class="alias-list"></div>
        </section>
      </section>

      <section class="bottom-grid">
        <section class="panel">
          <div class="panel-header">
            <h2 class="text-lg font-semibold">Stack Registry</h2>
            <button class="btn btn-ghost btn-sm" id="stack-form-reset" type="button">New</button>
          </div>
          <form id="stack-form" class="settings-form">
            <label>
              ID
              <input class="input input-bordered w-full" id="stack-id-input" name="id" placeholder="homepage" required />
            </label>
            <label>
              Name
              <input class="input input-bordered w-full" id="stack-name-input" name="name" placeholder="Homepage" required />
            </label>
            <label class="settings-form-wide">
              CWD
              <input class="input input-bordered w-full" id="stack-cwd-input" name="cwd" placeholder="/opt/rpi-infra" required />
            </label>
            <label class="settings-form-wide">
              Repo URL
              <input class="input input-bordered w-full" id="stack-repo-url-input" name="repo_url" placeholder="https://github.com/example/repo.git" />
            </label>
            <label>
              Compose File
              <input class="input input-bordered w-full" id="stack-compose-input" name="compose_file" placeholder="compose.homepage.yaml" required />
            </label>
            <label>
              Branch
              <input class="input input-bordered w-full" id="stack-branch-input" name="branch" placeholder="main" />
            </label>
            <label class="settings-form-wide">
              Tags
              <input class="input input-bordered w-full" id="stack-tags-input" name="tags" placeholder="infra,dashboard" />
            </label>
            <label>
              Direct URL
              <input class="input input-bordered w-full" id="stack-direct-url-input" name="direct_url" placeholder="http://localhost:3000/" />
            </label>
            <label>
              Traefik URL
              <input class="input input-bordered w-full" id="stack-traefik-url-input" name="traefik_url" placeholder="http://homepage.local/" />
            </label>
            <label class="settings-form-wide">
              Notes
              <textarea class="textarea textarea-bordered min-h-24 w-full" id="stack-notes-input" name="notes" placeholder="optional notes"></textarea>
            </label>
            <div class="inline-actions settings-form-wide">
              <button class="btn btn-primary" type="submit">Save Stack</button>
              <button class="btn btn-ghost" id="stack-form-clear" type="button">Clear</button>
            </div>
          </form>
          <div id="registry-list" class="alias-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="text-lg font-semibold">Git Credential</h2>
          </div>
          <form id="credential-form" class="settings-form">
            <label>
              Username
              <input class="input input-bordered w-full" id="credential-username-input" name="username" placeholder="git username" required />
            </label>
            <label>
              Password / Token
              <input class="input input-bordered w-full" id="credential-secret-input" name="secret" placeholder="leave blank to keep existing value" type="password" />
            </label>
            <div class="inline-actions settings-form-wide">
              <button class="btn btn-primary" type="submit">Save Credential</button>
              <button class="btn btn-ghost" id="credential-delete" type="button">Delete</button>
              <button class="btn btn-ghost" id="credential-form-clear" type="button">Clear</button>
            </div>
          </form>
          <div id="credential-status" class="alias-list"></div>
        </section>
      </section>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
