<!doctype html>
<html lang="ja" data-theme="niwaki">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Niwaki</title>
    <script>
      (() => {
        const parts = window.location.pathname.split("/").filter(Boolean);
        let tailLength = 0;
        if (parts.at(-1) === "settings" || parts.at(-1) === "aliases") {
          tailLength = 1;
        } else if (parts.length >= 2 && parts.at(-2) === "stacks") {
          tailLength = 2;
        } else if (parts.at(-1) === "index.html") {
          tailLength = 1;
        }
        const baseParts = tailLength ? parts.slice(0, -tailLength) : parts;
        const base = baseParts.length ? `/${baseParts.join("/")}` : "";
        window.__NIWAKI_BASE__ = base;
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${base}/styles.css`;
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div class="shell" id="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Single Host Compose Deploy UI</p>
          <h1 class="text-3xl font-semibold tracking-tight">Niwaki</h1>
          <p class="lede">stack ごとにページを分けて、Docker Compose の状態・操作・設定を管理します。</p>
        </div>
        <div class="access-cards" id="access-cards"></div>
      </header>

      <div class="toolbar">
        <nav class="main-nav" id="main-nav"></nav>
        <div class="toolbar-actions">
          <button class="btn btn-ghost btn-sm" id="sidebar-toggle" type="button">Collapse</button>
          <button class="btn btn-outline btn-sm" id="refresh-button" type="button">Refresh</button>
        </div>
      </div>

      <main class="workspace">
        <aside class="panel sidebar">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Registry</p>
              <h2 class="text-lg font-semibold">Stacks</h2>
            </div>
          </div>
          <div id="stack-list" class="stack-list"></div>
        </aside>

        <section id="page-content" class="page-content"></section>
      </main>
    </div>

    <script type="module">
      const base = window.__NIWAKI_BASE__ || "";
      await import(`${base}/app.js`);
    </script>
  </body>
</html>
